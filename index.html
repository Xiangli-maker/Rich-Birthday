<!-- Photo Gallery -->
<div class="gallery-section">
  <div class="gallery-title">🥏 Guess Rich's Age!</div>
  <div id="quiz-grid" style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;max-width:600px;margin:0 auto;"></div>
</div>

<!-- Timeline of correctly guessed photos -->
<div id="timeline-section" style="display:none;max-width:760px;margin:1.5rem auto;padding:0 1.5rem;">
  <div style="font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:600;color:#2a2118;text-align:center;margin-bottom:14px;">📅 Rich Through the Years</div>
  <div id="timeline-row" style="display:flex;flex-wrap:wrap;gap:12px;justify-content:center;align-items:flex-end;"></div>
</div>

<!-- Quiz Modal -->
<div id="qoverlay" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:99998;">
  <div id="qbox" style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:#fff;border-radius:16px;padding:24px;width:90%;max-width:400px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.5);">
    <div style="text-align:right;margin-bottom:10px;">
      <button id="qclose" style="font-size:24px;background:none;border:none;cursor:pointer;color:#888;line-height:1;">&#x2715;</button>
    </div>
    <img id="qphoto" src="" style="width:100%;max-height:220px;object-fit:cover;border-radius:10px;margin-bottom:14px;">
    <div style="font-size:20px;font-weight:600;color:#2a2118;margin-bottom:6px;">How old is Rich here?</div>
    <div style="font-size:13px;color:#a89880;margin-bottom:14px;">Take a guess! &#x1F914;</div>
    <div style="display:flex;gap:10px;justify-content:center;margin-bottom:14px;">
      <input id="qinput" type="number" min="0" max="30" placeholder="Age" style="width:90px;padding:10px;font-size:20px;text-align:center;border:2px solid #e8ddd0;border-radius:8px;outline:none;">
      <button id="qsubmit" style="padding:10px 24px;background:#a31f34;color:#fff;border:none;border-radius:8px;font-size:16px;font-weight:600;cursor:pointer;">Submit</button>
    </div>
    <div id="qresult" style="font-size:16px;font-weight:600;min-height:26px;"></div>
  </div>
</div>
<canvas id="fwcanvas" style="position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:99999;display:none;"></canvas>

<!-- Background Music -->
<audio id="bg-music" loop muted>
  <source src="musics.mp3" type="audio/mpeg">
</audio>
<button class="music-btn" id="music-btn" title="Play/Pause music">🎵</button>
<div class="music-label" id="music-label">musics</div>

<!-- Scripts -->
<script src="ui.js"></script>

<script src="timeline.js"></script>
<script src="quiz.js"></script>
<script src="text-background.js"></script>
